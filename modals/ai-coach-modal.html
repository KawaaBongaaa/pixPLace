<!-- AI Coach Modal -->
<div id="ai-coach-overlay" class="ai-coach-overlay-modern hidden">
    <div id="ai-coach-modal" class="ai-coach-modal">
        <!-- Header -->
        <div class="ai-coach-header">
            <div class="ai-coach-header-content">
                <div class="ai-coach-header-left">
                    <div class="ai-coach-header-icon">☘️</div>
                    <div>
                        <h3 class="ai-coach-header-title">AI Assistant</h3>
                    </div>
                </div>
                <button class="ai-coach-close-btn" title="Закрыть" aria-label="Закрыть">×</button>
            </div>
        </div>

        <!-- Chat Area -->
        <div id="ai-coach-chat" class="ai-chat-container">
            <div id="ai-chat-messages" class="ai-chat-messages">
                <div class="ai-welcome-message">AI chat ready!</div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="ai-coach-input-area" aria-label="Message input area">
            <div class="ai-coach-input-container">
                <input id="ai-coach-input" class="ai-coach-input form-textarea" type="text" placeholder="Write to your AI assistant..." aria-label="Write to your AI assistant...">
                <button id="ai-coach-send-btn" class="ai-coach-send-btn" title="Отправить сообщение" aria-label="Отправить сообщение">📤</button>
            </div>
        </div>
    </div>
</div>
