name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push to gh-pages branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build:css

      # ── Inject all secret webhook URLs into app_modern.js ──────────────────
      - name: Inject webhook secrets
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          CHAT_WEBHOOK_URL: ${{ secrets.CHAT_WEBHOOK_URL }}
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
          N8N_ENHANCE_WEBHOOK_URL: ${{ secrets.N8N_ENHANCE_WEBHOOK_URL }}
          HISTORY_WEBHOOK_URL: ${{ secrets.HISTORY_WEBHOOK_URL }}
          AUTH_WEBHOOK_URL: ${{ secrets.AUTH_WEBHOOK_URL }}
          GET_USER_PROFILE_WEBHOOK_URL: ${{ secrets.get_user_profile_webhook }}
          Z_IMAGE_WEBHOOK_URL: ${{ secrets.Z_IMAGE_WEBHOOK }}
          QWEN_IMAGE_WEBHOOK_URL: ${{ secrets.QWEN_IMAGE_WEBHOOK }}
        run: |
          echo "🔧 Injecting webhook URLs safely with Node.js..."
          
          node -e '
            const fs = require("fs");
            const path = require("path");
            
            const replacements = {
              "PLACEHOLDER_WEBHOOK_URL": process.env.WEBHOOK_URL || "",
              "PLACEHOLDER_CHAT_WEBHOOK_URL": process.env.CHAT_WEBHOOK_URL || "",
              "PLACEHOLDER_N8N_WEBHOOK_URL": process.env.N8N_WEBHOOK_URL || "",
              "PLACEHOLDER_N8N_ENHANCE_WEBHOOK_URL": process.env.N8N_ENHANCE_WEBHOOK_URL || "",
              "PLACEHOLDER_HISTORY_WEBHOOK_URL": process.env.HISTORY_WEBHOOK_URL || "",
              "PLACEHOLDER_AUTH_WEBHOOK_URL": process.env.AUTH_WEBHOOK_URL || "",
              "PLACEHOLDER_GET_USER_PROFILE_WEBHOOK_URL": process.env.GET_USER_PROFILE_WEBHOOK_URL || "",
              "PLACEHOLDER_Z_IMAGE_WEBHOOK_URL": process.env.Z_IMAGE_WEBHOOK_URL || "",
              "PLACEHOLDER_QWEN_IMAGE_WEBHOOK_URL": process.env.QWEN_IMAGE_WEBHOOK_URL || ""
            };
            
            function processDirectory(dir) {
              const files = fs.readdirSync(dir);
              
              for (const file of files) {
                const fullPath = path.join(dir, file);
                const stat = fs.statSync(fullPath);
                
                if (stat.isDirectory()) {
                  if (!fullPath.includes("node_modules") && !fullPath.includes(".git") && !fullPath.includes(".gemini") && !fullPath.includes(".agents") && !fullPath.includes(".vscode")) {
                    processDirectory(fullPath);
                  }
                } else if (fullPath.endsWith(".js")) {
                  let content = fs.readFileSync(fullPath, "utf8");
                  let changed = false;
                  
                  for (const [placeholder, value] of Object.entries(replacements)) {
                    if (content.includes(placeholder)) {
                      content = content.split(placeholder).join(value);
                      changed = true;
                    }
                  }
                  
                  if (changed) {
                    fs.writeFileSync(fullPath, content);
                    console.log(`✅ Updated ${fullPath}`);
                  }
                }
              }
            }
            
            processDirectory(".");
          '

      # ── Verify no placeholders remain in ALL JS files ─────────────────────
      - name: Verify replacements
        run: |
          PLACEHOLDER_FOUND=0
          while IFS= read -r -d '' file; do
            if grep -q "PLACEHOLDER_" "$file"; then
              echo "❌ Unreplaced placeholder in $file:"
              grep -n "PLACEHOLDER_" "$file"
              PLACEHOLDER_FOUND=1
            fi
          done < <(find . -name "*.js" -not -path "*/node_modules/*" -not -path "*/.git/*" -not -path "*/.gemini/*" -print0)
          if [ $PLACEHOLDER_FOUND -eq 1 ]; then
            exit 1
          else
            echo "✅ All placeholders replaced in all JS files."
          fi

      # ── Deploy to gh-pages branch ──────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: |
            .github
            dev-server.js
            test-env.js
            package.json
            package-lock.json
            node_modules
            .env
            .env.local
            *.bak
            *.log
