name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push to gh-pages branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Inject all secret webhook URLs into app_modern.js ──────────────────
      - name: Inject webhook secrets
        run: |
          echo "🔧 Injecting webhook URLs from GitHub Secrets..."

          sed -i "s|PLACEHOLDER_WEBHOOK_URL|${{ secrets.WEBHOOK_URL }}|g" app_modern.js
          sed -i "s|PLACEHOLDER_CHAT_WEBHOOK_URL|${{ secrets.CHAT_WEBHOOK_URL }}|g" app_modern.js
          sed -i "s|PLACEHOLDER_N8N_WEBHOOK_URL|${{ secrets.N8N_WEBHOOK_URL }}|g" app_modern.js
          sed -i "s|PLACEHOLDER_N8N_ENHANCE_WEBHOOK_URL|${{ secrets.N8N_ENHANCE_WEBHOOK_URL }}|g" app_modern.js
          sed -i "s|PLACEHOLDER_HISTORY_WEBHOOK_URL|${{ secrets.HISTORY_WEBHOOK_URL }}|g" app_modern.js

          echo "✅ All webhook URLs injected."

      # ── Verify no placeholders remain ──────────────────────────────────────
      - name: Verify replacements
        run: |
          if grep -q "PLACEHOLDER_" app_modern.js; then
            echo "❌ ERROR: Some PLACEHOLDER_ values were NOT replaced!"
            grep -n "PLACEHOLDER_" app_modern.js
            exit 1
          else
            echo "✅ All placeholders replaced successfully."
          fi

      # ── Deploy to gh-pages branch ──────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: |
            .github
            dev-server.js
            test-env.js
            package.json
            package-lock.json
            node_modules
            .env
            .env.local
            *.bak
            *.log
